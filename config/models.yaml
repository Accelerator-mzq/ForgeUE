# Model registry —— 三段式配置（D-plan）。
#
# ① providers:   端点 + 认证绑一起，同一家 provider 定义一次
# ② models:      每个模型 = (LiteLLM 认识的 model id, 所属 provider_name, kind)
# ③ aliases:     场景别名（text_cheap / review_judge / ...），按 model 名引用
#
# bundle JSON 里用 `provider_policy.models_ref: "<alias>"` 引用别名；
# workflows loader 在 Pydantic 校验前展开为 `prepared_routes`，每个 route 带上
# 自己的 api_key_env + api_base → 一个别名可以混合多个 provider 而互不冲突。
#
# `kind` 标签决定 alias 能被哪类 executor / router 消费：
#   text         文本 / 结构化输出
#   image        图片生成（API 路径 / ComfyWorker）
#   image_edit   图像编辑（需 executor 扩展，当前仅注册占位）
#   mesh         3D 生成
#   audio        音频生成（保留未实现）
#   vision       多模态视觉输入（视觉质检 review）
#
# 国内 provider 一般都开放 OpenAI 兼容端口，LiteLLM 用 `openai/<id>` 前缀走
# `api_base` 覆盖即可，不用加自定义 adapter 代码。

# ---------------------------------------------------------------------------
# ① Providers
# ---------------------------------------------------------------------------

providers:
  # ============ 已接入（真实跑过）============
  minimaxi:
    api_key_env: MINIMAX_KEY
    api_base: "https://api.minimaxi.com/anthropic"

  packycode:
    api_key_env: PACKYCODE_KEY
    api_base: "https://www.packyapi.com"

  # ============ 国外 Big Providers（预留）============
  google_gemini:
    api_key_env: GOOGLE_API_KEY

  openai_native:
    api_key_env: OPENAI_API_KEY

  xai:
    api_key_env: XAI_API_KEY

  tripo3d:
    api_key_env: TRIPO3D_KEY
    api_base: "https://api.tripo3d.ai/v2"

  # ============ 国内 Big Providers（新增：便宜替代）============
  # 智谱 AI (ZhipuAI / 智谱清言) —— GLM 系列 + CogView 图生成
  # OpenAI 兼容端点：https://open.bigmodel.cn/api/paas/v4
  zhipu_openai_compat:
    api_key_env: ZHIPU_API_KEY
    api_base: "https://open.bigmodel.cn/api/paas/v4"

  # 阿里云百炼 (DashScope) —— Qwen 系列 + 通义万相图生/编辑
  # OpenAI 兼容端点：https://dashscope.aliyuncs.com/compatible-mode/v1
  dashscope_openai_compat:
    api_key_env: DASHSCOPE_API_KEY
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  # 腾讯混元 —— Hunyuan OpenAI 兼容（文本聊天用）
  tencent_hunyuan_openai_compat:
    api_key_env: HUNYUAN_API_KEY
    api_base: "https://api.hunyuan.cloud.tencent.com/v1"

  # 腾讯混元图生 —— tokenhub 代理端点（submit+query 协议，非 OpenAI）
  # 端点: https://tokenhub.tencentmaas.com/v1/api/image/{submit,query}
  # 认证: Authorization: Bearer <HUNYUAN_API_KEY or 单独给的 tokenhub key>
  tencent_hunyuan_tokenhub:
    api_key_env: HUNYUAN_API_KEY
    api_base: "https://tokenhub.tencentmaas.com/v1/api/image"

  # 腾讯混元生 3D —— tokenhub 代理端点
  # 端点: https://tokenhub.tencentmaas.com/v1/api/3d/{submit,query}
  tencent_hunyuan_3d_tokenhub:
    api_key_env: HUNYUAN_3D_KEY
    api_base: "https://tokenhub.tencentmaas.com/v1/api/3d"

# ---------------------------------------------------------------------------
# ② Models
# ---------------------------------------------------------------------------

models:
  # ============ 现有（保留）============
  mx_m2_7:
    id: "anthropic/MiniMax-M2.7"
    provider: minimaxi
    kind: text
  mx_m2_5:
    id: "anthropic/MiniMax-M2.5"
    provider: minimaxi
    kind: text
  pc_opus_4_6:
    id: "anthropic/claude-opus-4-6"
    provider: packycode
    kind: text
  pc_sonnet_4_6:
    id: "anthropic/claude-sonnet-4-6"
    provider: packycode
    kind: text
  pc_haiku_4_5:
    id: "anthropic/claude-haiku-4-5-20251001"
    provider: packycode
    kind: text
  pc_sonnet_4_6_vision:
    id: "anthropic/claude-sonnet-4-6"
    provider: packycode
    kind: vision

  gemini_flash_3:
    id: "gemini/gemini-3-flash"
    provider: google_gemini
    kind: vision
  gemini_pro_2_5:
    id: "gemini/gemini-2.5-pro"
    provider: google_gemini
    kind: vision
  gpt_4o:
    id: "openai/gpt-4o"
    provider: openai_native
    kind: vision
  gpt_4o_mini:
    id: "openai/gpt-4o-mini"
    provider: openai_native
    kind: text
  grok_4:
    id: "xai/grok-4"
    provider: xai
    kind: text

  dalle_3:
    id: "openai/dall-e-3"
    provider: openai_native
    kind: image
  gemini_imagen_3:
    id: "gemini/imagen-3.0-generate-001"
    provider: google_gemini
    kind: image

  tripo3d_v2:
    id: "tripo3d/v2"
    provider: tripo3d
    kind: mesh

  # ============ 新增：国内便宜替代 ============

  # --- 智谱 GLM 视觉（OpenAI 兼容 /chat/completions）---
  # 端点: https://open.bigmodel.cn/api/paas/v4/chat/completions
  # 2 元/百万 tokens，比 Claude Sonnet 输入价便宜约 90%
  glm_4_6v_flashX:
    id: "openai/glm-4.6v-flashx"     # 智谱期望 *小写* id
    provider: zhipu_openai_compat
    kind: vision

  glm_4_6v:
    id: "openai/glm-4.6v"            # 小写
    provider: zhipu_openai_compat
    kind: vision

  # --- 智谱图生成（待实测是否走 OpenAI /v1/images/generations 兼容）---
  glm_image:
    id: "openai/glm-image"           # 小写
    provider: zhipu_openai_compat
    kind: image

  # --- 阿里 Qwen-Plus（视觉 + 文本）---
  # OpenAI 兼容端点 https://dashscope.aliyuncs.com/compatible-mode/v1
  qwen3_6_plus:
    id: "openai/qwen-plus"           # DashScope compatible-mode 下的真实 id
    provider: dashscope_openai_compat
    kind: vision                     # 支持图像/视频输入

  # --- 阿里通义万相图生成 ---
  # NOTE: Qwen-Image 不走 OpenAI /v1/images/generations，而是
  # DashScope 原生 /api/v1/services/aigc/multimodal-generation/generation 协议
  # 需要 QwenImageWorker / QwenImageAdapter 实现才能真跑（TODO）
  qwen_image_2:
    id: "qwen/qwen-image-2.0"        # 自定义命名空间，标明"非 OpenAI 路径"
    provider: dashscope_openai_compat
    kind: image

  qwen_image_2_pro:
    id: "qwen/qwen-image-2.0-pro"
    provider: dashscope_openai_compat
    kind: image

  # --- 阿里通义万相图像编辑 ---
  # 同协议，需要 QwenImageEditWorker 才能真跑（TODO）
  qwen_image_edit_plus:
    id: "qwen/qwen-image-edit-plus"
    provider: dashscope_openai_compat
    kind: image_edit

  qwen_image_edit_max:
    id: "qwen/qwen-image-edit-max"
    provider: dashscope_openai_compat
    kind: image_edit

  qwen_image_edit:
    id: "qwen/qwen-image-edit"
    provider: dashscope_openai_compat
    kind: image_edit

  # --- 腾讯混元图生 ---
  # 端点 tokenhub.tencentmaas.com/v1/api/image/{submit,query} —— 非 OpenAI 协议
  # 需要 HunyuanImageWorker（TODO）
  hunyuan_image_v3:
    id: "hunyuan/hy-image-v3.0"      # 非 LiteLLM 前缀，标明自定义 worker
    provider: tencent_hunyuan_tokenhub
    kind: image

  # --- 腾讯混元图像风格化（视同图编辑）---
  hunyuan_image_style:
    id: "hunyuan/hy-image-v3.0"      # 同 id，不同 kind 语义
    provider: tencent_hunyuan_tokenhub
    kind: image_edit

  # --- 腾讯混元生 3D ---
  # 端点 tokenhub.tencentmaas.com/v1/api/3d/{submit,query}
  # 用 Bearer sk-xxx 认证（对应 HUNYUAN_3D_KEY），**不是** TC3 签名
  # 当前 HunyuanMeshWorker 走 tencentcloudapi.com + TC3，需要重写为 tokenhub 版
  hunyuan_3d:
    id: "hunyuan/hy-3d-3.1"
    provider: tencent_hunyuan_3d_tokenhub
    kind: mesh

# ---------------------------------------------------------------------------
# ③ Aliases
# ---------------------------------------------------------------------------

aliases:
  # 别名按「场景能力」命名，不按厂商 / 成本档位命名。想换模型（国内国外、
  # 便宜强力）直接改 preferred / fallback 里引用的 model 名字即可 ——
  # 下游 bundle JSON 一行都不用动，无 `_cn` / `_intl` 这种维度交叉。

  # 轻量文本：结构化抽取 / 任务规划 / spec 组装
  text_cheap:
    preferred: [mx_m2_7]
    fallback:  [pc_sonnet_4_6]

  # 强文本：复杂推理 / 长程规划
  text_strong:
    preferred: [pc_opus_4_6]
    fallback:  [pc_sonnet_4_6]

  # 评审判官：rubric 打分 / Verdict 决策（文本 / metadata 级别）
  review_judge:
    preferred: [pc_opus_4_6]
    fallback:  [pc_sonnet_4_6]

  # UE5 Python API 查询辅助（代码级问答）
  ue5_api_assist:
    preferred: [pc_sonnet_4_6]
    fallback:  [pc_opus_4_6]

  # 视觉评审判官：多模态，真看图打分
  review_judge_visual:
    preferred: [glm_4_6v_flashX, glm_4_6v]
    fallback:  [qwen3_6_plus]

  # 快速图生成
  image_fast:
    preferred: [glm_image]
    fallback:  [qwen_image_2]

  # 高质量图生成
  image_strong:
    preferred: [qwen_image_2_pro]
    fallback:  [hunyuan_image_v3]

  # 图像编辑：prompt + 源图 → 编辑后图（L5-A 新能力）
  # CapabilityRouter.image_edit 同时接受 kind=image_edit 和 kind=image 路由
  # （kind=image 的 DALL-E 等通过 b64 source 在 image_generation 里做 edit）
  image_edit:
    preferred: [qwen_image_edit_plus]
    fallback:  [qwen_image_edit_max, hunyuan_image_style]

  # image-to-3D 网格生成
  mesh_from_image:
    preferred: [hunyuan_3d]
    fallback:  [hunyuan_3d]
